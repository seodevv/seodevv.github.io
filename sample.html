<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>전자서명 문서 예시</title>
  <style>
    /* ====== A4 설정 ====== */
    @page {
      size: A4;
      margin: 20mm;
    }

    body {
      background: #e5e5e5;
      margin: 0;
      padding: 40px 0;
      font-family: "Noto Sans KR", Arial, sans-serif;
      color: #000;
    }

    .a4 {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      margin: 0 auto;
      padding: 20mm;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .meta {
      margin-bottom: 30px;
      font-size: 14px;
    }

    .meta table {
      width: 100%;
      border-collapse: collapse;
    }

    .meta th,
    .meta td {
      padding: 6px 8px;
      text-align: left;
    }

    .meta th {
      width: 120px;
      font-weight: 600;
    }

    .content {
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 60px;
    }

    .content p {
      margin: 0 0 16px;
    }

    /* ====== 결재 영역 ====== */
    .sign-section {
      margin-top: 80px;
    }

    .sign-table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      font-size: 14px;
    }

    .sign-table th,
    .sign-table td {
      border: 1px solid #000;
      height: 80px;
      padding: 6px;
      vertical-align: middle;
    }

    .sign-table th {
      height: 40px;
      font-weight: 600;
      background: #f9f9f9;
    }

    .signer-name {
      margin-top: 6px;
      font-size: 13px;
    }

    .signer-img {
      height: 40px;
    }

    .date {
      margin-top: 40px;
      text-align: right;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="a4">
    <h1>전자서명 확인서</h1>

    <!-- 문서 메타 정보 -->
    <div class="meta">
      <table>
        <tr>
          <th>문서번호</th>
          <td>DOC-2025-001</td>
        </tr>
        <tr>
          <th>작성일자</th>
          <td>2025-12-17</td>
        </tr>
        <tr>
          <th>작성부서</th>
          <td>IT 인프라팀</td>
        </tr>
      </table>
    </div>

    <!-- 본문 -->
    <div class="content">
      <p>
        본 문서는 전자서명 예시를 목적으로 작성된 더미 문서입니다.
      </p>
      <p>
        아래 결재란에 표시된 서명은 실제 법적 효력을 가지지 않으며,
        화면 구성 및 출력 형태 확인을 위한 샘플입니다.
      </p>
      <p>
        본 문서의 내용에 대해 관계자는 이를 확인하였으며,
        전자적 방식으로 결재가 이루어졌음을 확인합니다.
      </p>
    </div>

    <!-- 결재선 -->
    <div class="sign-section">
      <table class="sign-table">
        <tr>
          <th>담당자</th>
          <th>검토자</th>
          <th>최종 결재자</th>
        </tr>
        <tr>
          <td>
            서진원
          </td>
          <td>
            최훈명
          </td>
          <td>
            <!-- 🔽 여기만 경로 수정해서 사용 -->
            <img
              class="signer-img"
              src="https://seodevv.github.io/seodev_sign.png"
              alt="최종 결재자 서명"
            />
            <div class="signer-name">홍길동</div>
          </td>
        </tr>
      </table>
    </div>

    <div class="date">
      2025년 12월 17일
    </div>
  </div>

</body>
</html>
